{% extends "base.html" %}
{% block title %}Knowledge Base — MathStudio{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
        <h1
            class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-purple-600 mb-2">
            Knowledge Base
        </h1>
        <p class="text-slate-500">Search theorems, definitions & lemmas across your library</p>
    </div>

    <!-- Search Box -->
    <div class="relative mb-8">
        <i class="fas fa-search absolute left-4 top-4 text-slate-400 text-lg"></i>
        <input id="kb-search" type="text" placeholder="Search by name, concept or keyword..."
            class="w-full pl-12 pr-4 py-3.5 border-2 border-slate-200 rounded-2xl focus:ring-2 focus:ring-violet-500 focus:border-violet-500 text-base font-medium shadow-sm transition-all"
            oninput="debounceSearch()" autofocus>
    </div>

    <!-- Stats Row -->
    <div id="results-header" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4"></div>

    <!-- Results List -->
    <div id="results-list" class="space-y-2"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const API = '/api/v1';
    let searchTimeout = null;
    let currentTermId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadTerms();
    });

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            if (currentTermId) closeDetail();
            loadTerms();
        }, 300);
    }

    async function loadTerms() {
        const search = document.getElementById('kb-search').value.trim();

        if (search.length === 0) {
            // Show empty welcome state
            document.getElementById('results-header').textContent = '';
            document.getElementById('results-list').innerHTML = `<div class="text-center py-20 text-slate-400">
                <i class="fas fa-search text-5xl mb-5 text-violet-200"></i>
                <p class="font-bold text-lg text-slate-600">Search your Knowledge Base</p>
                <p class="text-sm mt-2">Type a concept, theorem name, or keyword to find matching terms</p>
            </div>`;
            return;
        }

        const resp = await fetch(`${API}/kb/terms/search?q=${encodeURIComponent(search)}&limit=100`);
        const data = await resp.json();
        renderResults(data, `${data.length} result(s) for "${search}"`);
    }

    function renderResults(terms, headerText) {
        document.getElementById('results-header').textContent = headerText;
        const list = document.getElementById('results-list');

        if (!terms.length) {
            list.innerHTML = `<div class="text-center py-16 text-slate-400">
                <i class="fas fa-search text-4xl mb-4 text-slate-300"></i>
                <p class="font-bold text-lg text-slate-600">No matching terms found</p>
                <p class="text-sm mt-1">Try different keywords or mathematical notation</p>
            </div>`;
            return;
        }

        const kindColors = {
            'theorem': 'bg-blue-50 text-blue-700 border-blue-200',
            'definition': 'bg-emerald-50 text-emerald-700 border-emerald-200',
            'lemma': 'bg-amber-50 text-amber-700 border-amber-200',
            'proposition': 'bg-indigo-50 text-indigo-700 border-indigo-200',
            'corollary': 'bg-purple-50 text-purple-700 border-purple-200',
            'example': 'bg-slate-50 text-slate-600 border-slate-200',
            'exercise': 'bg-rose-50 text-rose-700 border-rose-200',
            'remark': 'bg-teal-50 text-teal-700 border-teal-200',
        };

        list.innerHTML = terms.map(t => {
            const kindClass = kindColors[t.term_type] || 'bg-gray-50 text-gray-600 border-gray-200';
            const source = t.book_author
                ? `${escapeHtml(t.book_author)}, p. ${t.page_start}`
                : `Book ${t.book_id}, p. ${t.page_start}`;

            return `
            <div id="term-container-${t.id}" class="rounded-xl border border-slate-100 bg-white transition-all hover:shadow-md overflow-hidden">
                <button onclick="toggleTerm(${t.id})" id="term-btn-${t.id}" class="w-full text-left px-5 py-3.5 transition-all flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="px-2 py-0.5 rounded border text-[9px] font-black uppercase tracking-widest whitespace-nowrap ${kindClass}">${t.term_type}</span>
                        <span class="font-bold text-slate-800 truncate">${escapeHtml(t.name)}</span>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 whitespace-nowrap flex items-center gap-1">
                        <i class="fas fa-book text-slate-300"></i> ${source}
                    </span>
                </button>
                <div id="term-detail-${t.id}" class="hidden"></div>
            </div>`;
        }).join('');
    }

    async function toggleTerm(id) {
        const detailDiv = document.getElementById(`term-detail-${id}`);
        const btnRow = document.getElementById(`term-btn-${id}`);

        if (!detailDiv.classList.contains('hidden')) {
            detailDiv.classList.add('hidden');
            detailDiv.innerHTML = '';
            btnRow.classList.remove('bg-violet-50/50');
            currentTermId = null;
            return;
        }

        // Close previously open
        if (currentTermId && currentTermId !== id) {
            const oldDetail = document.getElementById(`term-detail-${currentTermId}`);
            const oldBtn = document.getElementById(`term-btn-${currentTermId}`);
            if (oldDetail) { oldDetail.classList.add('hidden'); oldDetail.innerHTML = ''; }
            if (oldBtn) oldBtn.classList.remove('bg-violet-50/50');
        }

        currentTermId = id;
        btnRow.classList.add('bg-violet-50/50');

        const resp = await fetch(`${API}/kb/terms/${id}`);
        if (!resp.ok) return;
        const t = await resp.json();

        let html = '<div class="p-6 border-t border-slate-100 bg-slate-50/50">';

        // Keywords
        if (t.used_terms) {
            const kws = parseKeywords(t.used_terms);
            if (kws.length) {
                html += `<div class="flex flex-wrap gap-1 mb-4">${kws.map(kw =>
                    `<span class="px-2 py-0.5 bg-white text-slate-500 text-[10px] font-bold rounded-lg border border-slate-200">${escapeHtml(kw)}</span>`
                ).join('')}</div>`;
            }
        }

        // LaTeX content
        if (t.latex_content) {
            html += `<div class="bg-slate-900 rounded-xl p-5 text-xs font-mono text-emerald-400 overflow-x-auto max-h-[500px] overflow-y-auto shadow-inner latex-preview">${escapeHtml(t.latex_content)}</div>`;
        }

        // Source link
        html += '<div class="mt-4 flex justify-between items-center">';
        if (t.book_path) {
            html += `<a href="/open/${encodeURIComponent(t.book_path)}#page=${t.page_start}" target="_blank"
                class="inline-flex items-center px-4 py-2 bg-violet-600 text-white text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-violet-700 transition-all shadow-lg shadow-violet-600/20">
                <i class="fas fa-file-pdf mr-2"></i> Open Book (P. ${t.page_start})
            </a>`;
        } else {
            html += `<span class="text-[10px] text-slate-400 font-bold">Book ${t.book_id}, Page ${t.page_start}</span>`;
        }
        html += `<button onclick="deleteTerm(${t.id})" class="text-rose-400 hover:text-rose-600 text-[10px] font-black uppercase tracking-widest transition-colors">
            <i class="fas fa-trash-alt mr-1"></i> Remove
        </button>`;
        html += '</div></div>';

        detailDiv.innerHTML = html;
        detailDiv.classList.remove('hidden');

        // Render math
        setTimeout(() => {
            const latex = detailDiv.querySelector('.latex-preview');
            if (latex) {
                renderMathInElement(latex, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
            }
        }, 50);
    }

    function closeDetail() {
        if (currentTermId) {
            const d = document.getElementById(`term-detail-${currentTermId}`);
            const b = document.getElementById(`term-btn-${currentTermId}`);
            if (d) { d.classList.add('hidden'); d.innerHTML = ''; }
            if (b) b.classList.remove('bg-violet-50/50');
            currentTermId = null;
        }
    }

    async function deleteTerm(id) {
        if (!confirm("Remove this term from your Knowledge Base?")) return;
        const resp = await fetch(`${API}/kb/terms/${id}`, { method: 'DELETE' });
        if ((await resp.json()).success) {
            closeDetail();
            loadTerms();
            showToast('✓ Term removed');
        }
    }

    function parseKeywords(str) {
        if (!str) return [];
        try {
            const parsed = JSON.parse(str);
            if (Array.isArray(parsed)) return parsed.map(s => String(s).trim()).filter(s => s);
        } catch (e) { }
        return str.split(',').map(s => s.trim()).filter(s => s);
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl text-sm font-black uppercase tracking-widest bg-slate-900 text-white border border-slate-700';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
    }
</script>
{% endblock %}
